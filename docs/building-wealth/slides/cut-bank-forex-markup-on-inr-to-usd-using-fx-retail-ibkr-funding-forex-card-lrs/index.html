### 1️⃣ The Hidden Drain 💸

&lt;div class=&#34;fragment fade-in-then-out&#34;&gt;
&lt;p style=&#34;font-size: 1.4em; color: #ef4444;&#34;&gt;&lt;strong&gt;Every time you convert INR → USD...&lt;/strong&gt;&lt;/p&gt;
&lt;p style=&#34;font-size: 1.2em; margin-top: 20px;&#34;&gt;Your bank quietly charges &lt;strong&gt;₹1.50–₹1.75 per USD&lt;/strong&gt; over the real interbank rate.&lt;/p&gt;

### 2️⃣ Introducing FX Retail 🌐

&lt;p style=&#34;font-size: 1.2em;&#34;&gt;&lt;strong&gt;FX Retail&lt;/strong&gt; is a forex dealing platform launched in &lt;strong&gt;August 2019&lt;/strong&gt;.&lt;/p&gt;

&lt;div class=&#34;fragment&#34;&gt;

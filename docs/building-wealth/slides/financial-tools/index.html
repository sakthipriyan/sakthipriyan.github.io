### 1. Cash &amp; Bank Accounts

**Purpose:** Liquidity and easy access 💧  

|  |  |  |
|------|--------------|---------|
| Bank Accounts | For salary credit, bill payments and daily expenses | 🟢&amp;nbsp;Continue |
| Cash in Hand | Limited non-digital usage | 🟡&amp;nbsp;Minimal |
| FD/RD | Used once; very tax inefficient | 🔴&amp;nbsp;Exited |

&gt; 💡 Keeps money flowing smoothly for expenses.

---

### 2. Insurance

**Purpose:** Risk management, not returns 🛡️  

|  |  |  |
|------|--------------|---------|
| Health | Covers hospitalization &amp; health-related expenses | 🟢&amp;nbsp;Continue |
| Term / Accident | Protects dependents in case of untimely demise | 🟢&amp;nbsp;Continue |
| Motor | Mandatory for all vehicles | 🟢&amp;nbsp;Continue |
| Home | Protects property &amp; belongings | 🟡&amp;nbsp;Optional |

&gt; 💡 First line of defense for **Building Wealth.**

---

### 3 Investments

**Purpose:** 📈 Long-term growth for building wealth  

--
#### 3a. Equity

|  |  |  |
|------|--------------|---------|
| Index Funds | Low-cost, broad-market | 🟢&amp;nbsp;Continue |
| Active Funds | Higher cost, inconsistent | 🟡&amp;nbsp;Paused |
| Demat Account | For direct equity holdings | 🟡&amp;nbsp;Paused |
| US Equity | Global diversification via International Broker | 🟢&amp;nbsp;Continue |

&gt; 📈 Grow wealth by owning businesses.

--

#### 3b. Hybrid &amp; Debt
|  |  |  |
|------|--------------|---------|
| Arbitrage Funds | Short-term parking for travel/medical corpus | 🟢&amp;nbsp;Continue |
| Debt/Hybrid Funds | Used in the past; paused post-tax change | 🟡&amp;nbsp;Paused |
| Debt Mutual Funds | Reduced benefit after Apr 2023 taxation | 🟡&amp;nbsp;Paused |

&gt; 💰 Debt funds provide steady income and lower volatility.


--
#### 3b. Hybrid &amp; Debt / Retirement
|  |  |  |
|------|--------------|---------|
| PPF | Long-term, government-backed, tax-efficient savings | 🟢&amp;nbsp;Continue |
| EPF | Mandatory for salaried; offers tax-free compounding | 🟡&amp;nbsp;Minimum |
| NPS | Limited flexibility and withdrawal constraints | 🟡&amp;nbsp;Minimum |

&gt; 💡 Provides long-term stability and retirement-focused growth.

--

#### 3c. Gold

**Purpose:** Inflation hedge, diversification and jewellery 💍  

|  |  |  |
|------|--------------|---------|
| Gold ETF | Preferred for future investments — lower cost | 🟢&amp;nbsp;Planned |
| Gold Mutual Fund | Existing investment, held for diversification | 🟡&amp;nbsp;Paused |
| Physical Gold | Minimal jewellery holding as required | 🟡&amp;nbsp;Minimal |

&gt; 💡 Acts as a portfolio stabilizer.

--

#### 3d. Real Assets

**Purpose:** Tangible assets for utility and lifestyle 🏠  

|  |  |  |
|------|--------------|---------|
| House | Primary residence with potential appreciation | 🟡&amp;nbsp;Minimal |
| Vehicle | Utility, not investment; manage depreciation sensibly | 🟡&amp;nbsp;Minimal |

&gt; 💡 Offers stability, but comes with ongoing costs.

---

### 4. Credit Cards &amp; Loans

**Purpose:** Smart leverage and cash-flow management 💳  

|  |  |  |
|------|--------------|---------|
| Credit Cards | Use responsibly for rewards and short-term credit | 🟢&amp;nbsp;Continue |
| Loans | Avoid for consumption; consider only for appreciating assets | 🟡&amp;nbsp;Minimal |

&gt; 💡 *Use credit but, don’t let it use you.*

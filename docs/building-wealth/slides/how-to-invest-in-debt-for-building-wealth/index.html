### 1️⃣ Asset Classes

📈 Know Your Asset Classes for **Building Wealth**  

|               |                |                        |     |
|---------------|----------------|------------------------|-----|
| 🟢 **Equity** | Ownership      | Index Funds / ETFs     | 80% |
| 🟢 **Debt**   | Lending        | Debt / Hybrid / PPF    | 10% |
| 🟢 **Gold**   | Store of Value | ETF / MF               | 10% |

&gt; Debt is **not** a wealth creator — it is a  
&gt; **wealth stabilizer &#43; risk reducer**.

---

### 2️⃣ What is Debt?
&gt; **Debt means you lend your money safely to an institution and earn steady interest in return.**

&gt; These institutions can include Governments, Banks or Companies.

--

#### 🧭 Debt Behavior

|  |
|--------------|
| 💰 Earn **interest**, not market-driven returns |
| 📉 Offer lower volatility than equity |
| 🛡️ Preserve capital &amp; provide predictable returns |
| 💧 Provide short/medium-term liquidity |
| 🎯 Help match time-bound goals &amp; emergencies |
| 🪨 Reduce overall portfolio drawdowns |

### 4️⃣ A. Liquid Fund
&gt; A Liquid Fund invests in **very short-term debt** (&lt;= 91 days) (T-bills, commercial paper) with **high liquidity and very low risk**.
&lt;div style=&#34;display: flex; gap: 40px; justify-content: center; align-items: flex-start; margin-top: 20px;&#34;&gt; &lt;div style=&#34;display: flex; flex-direction: column;&#34;&gt; &lt;table&gt; &lt;thead&gt; &lt;tr&gt;&lt;th&gt;Pros&lt;/th&gt;&lt;/tr&gt; &lt;/thead&gt; &lt;tbody&gt; &lt;tr&gt;&lt;td&gt;Very low risk&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;T&#43;0 / T&#43;1 liquidity&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Better than savings interest&lt;/td&gt;&lt;/tr&gt; &lt;/tbody&gt; &lt;/table&gt; &lt;/div&gt; &lt;div style=&#34;display: flex; flex-direction: column;&#34; class=&#34;fragment fade-left&#34;&gt; &lt;table&gt; &lt;thead&gt; &lt;tr&gt;&lt;th&gt;Cons&lt;/th&gt;&lt;/tr&gt; &lt;/thead&gt; &lt;tbody&gt; &lt;tr&gt;&lt;td&gt;Returns fluctuate slightly&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Not meant for long-term growth&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Lower returns vs. other debt categories&lt;/td&gt;&lt;/tr&gt; &lt;/tbody&gt; &lt;/table&gt; &lt;/div&gt; &lt;/div&gt;

--

### 4️⃣ B. Dynamic Bond Fund
&gt; A Dynamic Bond Fund invests across **short, medium, and long-term debt**, adjusting based on **interest rate cycles**.

&lt;div style=&#34;display: flex; gap: 40px; justify-content: center; align-items: flex-start;&#34;&gt; &lt;div style=&#34;display: flex; flex-direction: column;&#34;&gt; &lt;table&gt; &lt;thead&gt; &lt;tr&gt;&lt;th&gt;Pros&lt;/th&gt;&lt;/tr&gt; &lt;/thead&gt; &lt;tbody&gt;  &lt;tr&gt;&lt;td&gt;Higher return potential than liquid/ultra-short funds&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Professional duration management&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Can benefit from falling interest rates&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt; &lt;/table&gt; &lt;/div&gt; &lt;div style=&#34;display: flex; flex-direction: column;&#34; class=&#34;fragment fade-left&#34;&gt; &lt;table&gt; &lt;thead&gt; &lt;tr&gt;&lt;th&gt;Cons&lt;/th&gt;&lt;/tr&gt; &lt;/thead&gt; &lt;tbody&gt; &lt;tr&gt;&lt;td&gt;Interest-rate timing risk&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Higher NAV volatility&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Not suitable for &lt; 3-year goals&lt;/td&gt;&lt;/tr&gt; &lt;/tbody&gt; &lt;/table&gt; &lt;/div&gt; &lt;/div&gt;

--

### 4️⃣ C. Conservative Hybrid Fund
&gt; A hybrid fund investing **75–90% in debt** and **10–25% in equity**.

&lt;div style=&#34;display: flex; gap: 40px; justify-content: center; align-items: flex-start;&#34;&gt; &lt;div style=&#34;display: flex; flex-direction: column;&#34;&gt; &lt;table&gt; &lt;thead&gt; &lt;tr&gt;&lt;th&gt;Pros&lt;/th&gt;&lt;/tr&gt; &lt;/thead&gt; &lt;tbody&gt; &lt;tr&gt;&lt;td&gt;Can outperform pure debt funds&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Slight equity kicker with controlled risk&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Suitable for 2–3 year goals&lt;/td&gt;&lt;/tr&gt; &lt;/tbody&gt; &lt;/table&gt; &lt;/div&gt; &lt;div style=&#34;display: flex; flex-direction: column;&#34; class=&#34;fragment fade-left&#34;&gt; &lt;table&gt; &lt;thead&gt; &lt;tr&gt;&lt;th&gt;Cons&lt;/th&gt;&lt;/tr&gt; &lt;/thead&gt; &lt;tbody&gt; &lt;tr&gt;&lt;td&gt;Equity exposure → NAV volatility&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Taxed as debt (less efficient)&lt;/td&gt;&lt;/tr&gt; &lt;/tbody&gt; &lt;/table&gt; &lt;/div&gt; &lt;/div&gt;


--

### 4️⃣ D. Arbitrage Fund
&gt; A hybrid-equity strategy that earns low-risk returns by exploiting **price differences** between cash and futures markets.
&lt;div style=&#34;display: flex; gap: 40px; justify-content: center; align-items: flex-start;&#34;&gt; &lt;div style=&#34;display: flex; flex-direction: column;&#34;&gt; &lt;table&gt; &lt;thead&gt; &lt;tr&gt;&lt;th&gt;Pros&lt;/th&gt;&lt;/tr&gt; &lt;/thead&gt; &lt;tbody&gt; &lt;tr&gt;&lt;td&gt;Taxed as equity
&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Low volatility&lt;td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Good for parking money 3-12 months&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;No credit risk&lt;/td&gt;&lt;/tr&gt; &lt;/tbody&gt; &lt;/table&gt; &lt;/div&gt; &lt;div style=&#34;display: flex; flex-direction: column;&#34; class=&#34;fragment fade-left&#34;&gt; &lt;table&gt; &lt;thead&gt; &lt;tr&gt;&lt;th&gt;Cons&lt;/th&gt;&lt;/tr&gt; &lt;/thead&gt; &lt;tbody&gt; &lt;tr&gt;&lt;td&gt;Returns depend on market arbitrage spreads&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Not ideal in extremely low-vol periods&lt;/td&gt;&lt;/tr&gt; &lt;tr&gt;&lt;td&gt;Slightly more complex product&lt;/td&gt;&lt;/tr&gt; &lt;/tbody&gt; &lt;/table&gt; &lt;/div&gt; &lt;/div&gt;

--

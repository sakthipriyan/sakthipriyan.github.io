<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlocked Hierarchical CAS Parser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 900px; margin: 0 auto; padding: 20px;
            color: #333; background-color: #f4f6f8;
        }
        .upload-container {
            border: 2px dashed #0066cc; padding: 40px; text-align: center;
            border-radius: 8px; margin-bottom: 20px; background-color: #ffffff;
            cursor: pointer; transition: background 0.2s;
        }
        .upload-container:hover { background-color: #f0f7ff; }
        .header-flex {
            display: flex; justify-content: space-between; align-items: center;
        }
        button {
            background: #0066cc; color: white; border: none; padding: 10px 20px;
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        button:hover { background: #0052a3; }
        #output {
            white-space: pre-wrap; background: #1e1e2f; color: #e0e0e0;
            padding: 20px; border-radius: 8px; font-family: 'Courier New', monospace;
            overflow-x: auto; min-height: 400px; font-size: 13px;
        }
        .loading { color: #4CAF50; font-weight: bold; }
        .error { color: #ff5252; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Unlocked Mutual Fund CAS Parser</h2>
    
    <div class="upload-container" onclick="document.getElementById('pdf-file').click()">
        <h3>Click here to select your unlocked CAS PDF</h3>
        <p style="color: #666;">Parsing happens instantly in your browser.</p>
        <input type="file" id="pdf-file" accept="application/pdf" style="display: none;" />
    </div>

    <div class="header-flex">
        <h3>Extracted JSON Data:</h3>
        <button onclick="copyJSON()">📋 Copy JSON</button>
    </div>
    <div id="output">Waiting for file upload...</div>

    <script>
        // Initialize PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let rawJsonOutput = "";

        // Helper: Convert string with commas/parentheses to numbers safely
        function parseNumericStr(val) {
            if (!val) return null;
            const isNegative = val.includes('(') || val.includes('-');
            const cleanVal = val.replace(/[^\d.]/g, '');
            if (cleanVal === '') return null;
            return isNegative ? -parseFloat(cleanVal) : parseFloat(cleanVal);
        }

        // Helper: Copy to clipboard
        function copyJSON() {
            if (!rawJsonOutput) {
                alert("No data available to copy yet.");
                return;
            }
            navigator.clipboard.writeText(rawJsonOutput).then(() => {
                alert("JSON copied to clipboard!");
            }).catch(err => {
                console.error("Clipboard error:", err);
                alert("Failed to copy. Check console.");
            });
        }

        // Trigger on file upload
        document.getElementById('pdf-file').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            const outputDiv = document.getElementById('output');
            
            if (!file) return;
            outputDiv.innerHTML = '<span class="loading">Loading and parsing PDF... Please wait.</span>';

            const fileReader = new FileReader();
            
            fileReader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    // Load PDF without password
                    const loadingTask = pdfjsLib.getDocument({ data: typedarray });
                    const pdf = await loadingTask.promise;
                    
                    let fullText = '';
                    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                        const page = await pdf.getPage(pageNum);
                        const textContent = await page.getTextContent();
                        // Join elements with a space to prevent fused words
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + ' \n ';
                    }

                    // Execute parsing logic
                    const parsedData = parseCASData(fullText);
                    rawJsonOutput = JSON.stringify(parsedData, null, 4);
                    outputDiv.textContent = rawJsonOutput;

                } catch (error) {
                    console.error("PDF Parsing Error:", error);
                    outputDiv.innerHTML = `<span class="error">Execution Error: ${error.message} <br><br> Check the browser console (F12) for full stack trace.</span>`;
                }
            };
            
            fileReader.readAsArrayBuffer(file);
            // Reset input so the same file can be clicked again
            e.target.value = ''; 
        });

        // Core Parsing Engine
        function parseCASData(rawText) {
            const data = {
                investorInfo: {},
                fundHouses: []
            };

            // --- 1. Top Level Account Info ---
            const emailMatch = rawText.match(/Email Id:\s*([^\s]+)/i);
            if (emailMatch) data.investorInfo.email = emailMatch[1];

            const mobileMatch = rawText.match(/Mobile:\s*(\d+)/i);
            if (mobileMatch) data.investorInfo.mobile = mobileMatch[1];

            const periodMatch = rawText.match(/(\d{2}-[A-Za-z]{3}-\d{4})\s*To\s*(\d{2}-[A-Za-z]{3}-\d{4})/i);
            if (periodMatch) data.investorInfo.statementPeriod = `${periodMatch[1]} to ${periodMatch[2]}`;

            const kycMatch = rawText.match(/KYC:\s*([A-Z\s]+?)\s*PAN:\s*([A-Z\s]+)(?=\s|$)/i);
            if (kycMatch) {
                data.investorInfo.kycStatus = kycMatch[1].trim();
                data.investorInfo.panStatus = kycMatch[2].trim();
            }

            // --- 2. Hierarchical Parsing ---
            // Split the entire document by "Folio No:" to isolate every individual holding
            const blocks = rawText.split(/Folio No:/i);
            if (blocks.length <= 1) throw new Error("Could not find any Folio numbers in the document text.");

            let currentFundHouse = "Unknown Fund House";
            const fundHouseMap = {}; 

            for (let i = 0; i < blocks.length - 1; i++) {
                const preBlock = blocks[i];      // Text immediately *before* the Folio No
                const postBlock = blocks[i + 1]; // Text immediately *after* the Folio No

               // 1. Extract Fund House (with cleanup for "Balance" and "Summary" bleed)
                const fhMatch = preBlock.match(/([A-Za-z\s]+Mutual Fund)(?!.*Mutual Fund)/i);
                if (fhMatch) {
                    currentFundHouse = fhMatch[1]
                        .replace(/PORTFOLIO SUMMARY/i, '')
                        .replace(/.*?Balance\s*/i, '') // Removes "Unit Balance " bleed
                        .trim();
                }

                // 2. Extract Fund Name & ISIN (with cleanup for "OK" and "Registrar" bleed)
                // --- Extract Fund Name & ISIN ---
                // Updated Regex: Captures letters, numbers, and spaces for the ISIN
                const isinMatch = preBlock.match(/([^\n\r]*?)\s*-\s*ISIN\s*:\s*([A-Z0-9\s]+)(?!.*ISIN\s*:)/i);
                let fundName = "Unknown Fund";
                let isin = "Unknown ISIN";
                
                if (isinMatch) {
                    // Clean up the fund name
                    fundName = isinMatch[1]
                        .replace(/.*(?:PAN|KYC).*?OK\s*/gi, '') // Scrubs "PAN: OK" or "KYC: OK"
                        .replace(/^OK\s*/i, '')                 // Scrubs orphaned "OK "
                        .replace(/^[A-Z0-9\s]+\s*-\s*/, '')     // Scrubs internal AMC codes (e.g., "128 TSDGG - ")
                        .replace(/\s+/g, ' ')                   // Normalizes multiple spaces into one
                        .trim();
                    
                    // Clean up the ISIN
                    isin = isinMatch[2]
                        .replace(/Registrar.*/i, '')            // Cuts off the word "Registrar" if it bleeds in
                        .replace(/\s+/g, '')                    // Strips ALL spaces (INF 846 -> INF846)
                        .trim(); 
                }

                // Get Folio Number
                const folioMatch = postBlock.match(/^\s*([A-Za-z0-9\/\-]+)/);
                const folioNo = folioMatch ? folioMatch[1].trim() : "Unknown Folio";

                // Get Nominee
                const nomineeMatch = postBlock.match(/Nominee 1:\s*([A-Za-z\s]+)(?:\s*Nominee 2:|\n|$)/i);
                const nominee = nomineeMatch ? nomineeMatch[1].trim() : null;

                // Setup Fund Object
                const fundData = {
                    fundName: fundName,
                    isin: isin,
                    openingUnits: parseNumericStr((postBlock.match(/Opening Unit Balance:\s*([\d,.]+)/i) || [])[1]) || 0,
                    closingUnits: parseNumericStr((postBlock.match(/Closing Unit Balance:\s*([\d,.]+)/i) || [])[1]),
                    nav: null,
                    navDate: null,
                    totalCostValue: parseNumericStr((postBlock.match(/Total Cost Value:\s*([\d,.]+)/i) || [])[1]),
                    marketValue: parseNumericStr((postBlock.match(/Market Value.*?:\s*(?:INR)?\s*([\d,.]+)/i) || [])[1]),
                    transactions: []
                };

                // Get specific NAV Date and Value
                const navMatch = postBlock.match(/NAV on\s+([\d]{2}-[A-Za-z]{3}-[\d]{4})\s*:\s*(?:INR)?\s*([\d,.]+)/i);
                if (navMatch) {
                    fundData.navDate = navMatch[1];
                    fundData.nav = parseNumericStr(navMatch[2]);
                }

                // --- 3. Transaction & Tax Mapping ---
                const rawTransactions = [];

                // Standard Transaction Regex
                const fullTrxnRegex = /(\d{2}-[A-Za-z]{3}-\d{4})\s+(\(?[\d,]+\.\d{2}\)?)\s+([\d,]+\.\d{2,4})\s+(\(?[\d,]+\.\d{1,4}\)?)\s+(.+?)\s+([\d,]+\.\d{1,4})(?=\s|$|\n)/g;
                let trxMatch;
                while ((trxMatch = fullTrxnRegex.exec(postBlock)) !== null) {
                    rawTransactions.push({
                        type: "TXN",
                        date: trxMatch[1],
                        amount: parseNumericStr(trxMatch[2]),
                        nav: parseNumericStr(trxMatch[3]),
                        units: parseNumericStr(trxMatch[4]),
                        description: trxMatch[5].trim(),
                        balance: parseNumericStr(trxMatch[6])
                    });
                }

                // Fee/Stamp Duty Regex
                const feeRegex = /(\d{2}-[A-Za-z]{3}-\d{4})\s+(\(?[\d,]+\.\d{2}\)?)\s+(\*+[A-Za-z\s]+\*+)/g;
                while ((trxMatch = feeRegex.exec(postBlock)) !== null) {
                    rawTransactions.push({
                        type: "FEE",
                        date: trxMatch[1],
                        amount: parseNumericStr(trxMatch[2]),
                        description: trxMatch[3].replace(/\*/g, '').trim()
                    });
                }

                // Sort everything chronologically so Fees line up with their parent Transactions
                rawTransactions.sort((a, b) => new Date(a.date) - new Date(b.date));

                // Merge Fees into Transactions
                const mergedTransactions = [];
                rawTransactions.forEach(trx => {
                    if (trx.type === "FEE") {
                        let parentFound = false;
                        // Look backwards to find the standard transaction on the exact same date
                        for (let j = mergedTransactions.length - 1; j >= 0; j--) {
                            if (mergedTransactions[j].type === "TXN" && mergedTransactions[j].date === trx.date) {
                                mergedTransactions[j].feeAmount = (mergedTransactions[j].feeAmount || 0) + trx.amount;
                                mergedTransactions[j].feeType = trx.description;
                                parentFound = true;
                                break;
                            }
                        }
                        // If a standalone fee exists without a transaction, map it directly
                        if (!parentFound) mergedTransactions.push(trx); 
                    } else {
                        mergedTransactions.push(trx);
                    }
                });

                // Strip out internal logic flags
                fundData.transactions = mergedTransactions.map(t => {
                    delete t.type;
                    return t;
                });

                // Build Hierarchy map: House -> Folio -> Fund
                if (!fundHouseMap[currentFundHouse]) {
                    fundHouseMap[currentFundHouse] = {};
                }
                if (!fundHouseMap[currentFundHouse][folioNo]) {
                    fundHouseMap[currentFundHouse][folioNo] = {
                        nominees: nominee ? [nominee] : [],
                        funds: []
                    };
                }
                fundHouseMap[currentFundHouse][folioNo].funds.push(fundData);
            }

            // Convert Map to final nested JSON array
            for (const [fundHouseName, folios] of Object.entries(fundHouseMap)) {
                const folioArray = [];
                for (const [folioNo, folioData] of Object.entries(folios)) {
                    folioArray.push({
                        folioNo: folioNo,
                        nominees: folioData.nominees,
                        funds: folioData.funds
                    });
                }
                data.fundHouses.push({
                    fundHouse: fundHouseName,
                    folios: folioArray
                });
            }

            return data;
        }
    </script>
</body>
</html>
